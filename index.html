<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le'Kiray | Unified Heavy Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#020617',
              card: '#0f172a',
              border: '#1e293b',
              accent: '#6366f1',
              equipment: '#f59e0b'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #020617;
      color: #f1f5f9;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #020617;
    }

    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #334155;
    }
  </style>
  <link rel="stylesheet" href="/src/styles/globals.css">
</head>

<body class="selection:bg-indigo-500/30">
  <div id="error-overlay"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:red; z-index:9999; padding:20px; font-family:monospace; white-space:pre-wrap; overflow:auto;">
    <h1 style="color:white">Runtime Error Detected</h1>
    <pre id="error-message"></pre>
  </div>
  <script>
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      var overlay = document.getElementById('error-overlay');
      var message = document.getElementById('error-message');
      overlay.style.display = 'block';
      message.textContent = 'Error: ' + msg + '\nFile: ' + url + '\nLine: ' + lineNo + '\nColumn: ' + columnNo + '\n\n' + (error ? error.stack : '');
      return false;
    };
    window.onunhandledrejection = function (event) {
      var overlay = document.getElementById('error-overlay');
      var message = document.getElementById('error-message');
      overlay.style.display = 'block';
      message.textContent = 'Unhandled Rejection: ' + event.reason;
    };
  </script>
  <div id="root"></div>
  <script type="module" src="/src/app/main.tsx"></script>
</body>

</html>
